<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8a44e"/>
      <stop offset="50%" stop-color="#f0d078"/>
      <stop offset="100%" stop-color="#a07830"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
  </defs>

  <!-- Background circle — dark like a Greek coin -->
  <circle cx="256" cy="256" r="248" fill="url(#g2)" stroke="url(#g1)" stroke-width="8"/>

  <!-- Inner decorative ring — Greek key hint -->
  <circle cx="256" cy="256" r="224" fill="none" stroke="#c8a44e" stroke-width="2" opacity="0.3"/>
  <circle cx="256" cy="256" r="220" fill="none" stroke="#c8a44e" stroke-width="1" opacity="0.15"/>

  <!-- Owl body silhouette -->
  <path d="M256 420 C180 420 130 370 130 300 L130 220 C130 140 180 90 256 70 C332 90 382 140 382 220 L382 300 C382 370 332 420 256 420Z"
        fill="none" stroke="url(#g1)" stroke-width="4" opacity="0.6"/>

  <!-- Ear tufts -->
  <path d="M175 155 L155 85 L195 130Z" fill="url(#g1)" opacity="0.8"/>
  <path d="M337 155 L357 85 L317 130Z" fill="url(#g1)" opacity="0.8"/>

  <!-- Left eye ring -->
  <circle cx="200" cy="230" r="62" fill="none" stroke="url(#g1)" stroke-width="5"/>
  <circle cx="200" cy="230" r="52" fill="none" stroke="#c8a44e" stroke-width="2" opacity="0.4"/>
  <!-- Left eye — glowing amber -->
  <circle cx="200" cy="230" r="36" fill="#1a1508"/>
  <circle cx="200" cy="230" r="28" fill="#b8860b"/>
  <circle cx="200" cy="230" r="18" fill="#0d0d1a"/>
  <!-- Left eye highlight -->
  <circle cx="190" cy="220" r="7" fill="#f0d078" opacity="0.7"/>
  <circle cx="208" cy="238" r="3" fill="#f0d078" opacity="0.4"/>

  <!-- Right eye ring -->
  <circle cx="312" cy="230" r="62" fill="none" stroke="url(#g1)" stroke-width="5"/>
  <circle cx="312" cy="230" r="52" fill="none" stroke="#c8a44e" stroke-width="2" opacity="0.4"/>
  <!-- Right eye — glowing amber -->
  <circle cx="312" cy="230" r="36" fill="#1a1508"/>
  <circle cx="312" cy="230" r="28" fill="#b8860b"/>
  <circle cx="312" cy="230" r="18" fill="#0d0d1a"/>
  <!-- Right eye highlight -->
  <circle cx="302" cy="220" r="7" fill="#f0d078" opacity="0.7"/>
  <circle cx="320" cy="238" r="3" fill="#f0d078" opacity="0.4"/>

  <!-- Bridge between eyes -->
  <path d="M238 240 Q256 270 274 240" fill="none" stroke="url(#g1)" stroke-width="3"/>

  <!-- Beak -->
  <path d="M244 275 L256 305 L268 275Z" fill="url(#g1)" opacity="0.9"/>
  <path d="M248 280 L256 298 L264 280" fill="none" stroke="#a07830" stroke-width="1" opacity="0.5"/>

  <!-- Feather chevrons on chest -->
  <path d="M220 330 L256 350 L292 330" fill="none" stroke="url(#g1)" stroke-width="2.5" opacity="0.5"/>
  <path d="M210 350 L256 372 L302 350" fill="none" stroke="url(#g1)" stroke-width="2" opacity="0.35"/>
  <path d="M205 370 L256 392 L307 370" fill="none" stroke="url(#g1)" stroke-width="1.5" opacity="0.25"/>

  <!-- Talons / feet hint at bottom -->
  <path d="M220 410 L210 430 M230 412 L225 432 M240 413 L237 432" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M292 410 L302 430 M282 412 L287 432 M272 413 L275 432" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Subtle Greek meander pattern at bottom -->
  <path d="M140 460 h16 v-12 h12 v12 h16 v-12 h12 v12 h16 v-12 h12 v12 h16 v-12 h12 v12 h16 v-12 h12 v12 h16 v-12 h12 v12 h16 v-12 h12 v12 h16"
        fill="none" stroke="url(#g1)" stroke-width="1.5" opacity="0.2"/>
</svg>

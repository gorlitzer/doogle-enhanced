name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -timeout 120s ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Vet
        run: go vet ./...

      - name: govulncheck (known CVEs in deps and stdlib)
        # Report-only: stdlib CVEs are cleared by the 'stable' Go toolchain above
        # and the x/net html vulns are fixed by the pinned x/net@v0.55.0, but the
        # residual quic-go / webtransport-go CVEs are transitively pinned by
        # go-libp2p and can't be bumped without upgrading libp2p (tracked
        # follow-up). Don't fail the build on those; keep the report visible.
        continue-on-error: true
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -timeout 120s ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Vet
        run: go vet ./...

      - name: govulncheck (known CVEs in deps and stdlib)
        # Report-only: stdlib CVEs are cleared by the 'stable' Go toolchain above
        # and dependency CVEs were remediated by upgrading go-libp2p (v0.48),
        # go-libp2p-kad-dht (v0.41), x/net (v0.55) and chi (v5.3). The single
        # residual advisory (go-libp2p-kad-dht GO-2024-3218, DHT resource abuse)
        # has NO upstream fix available ("Fixed in: N/A"), so it can't be cleared
        # by bumping — keep the report visible without blocking the build.
        continue-on-error: true
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Only the repo owner can trigger releases, and only from the main branch.
    if: github.actor == 'gorlitzer'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main branch
        run: |
          # Ensure the tagged commit exists on main — prevents releases from rogue branches
          TAG_COMMIT=$(git rev-list -n 1 ${{ github.ref }})
          if ! git merge-base --is-ancestor "${TAG_COMMIT}" origin/main; then
            echo "::error::Release tags must be on the main branch. This tag points to a commit not on main."
            exit 1
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run tests before release
        run: go test -race -timeout 120s ./...

      - name: Extract version info
        id: vars
        run: |
          echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "COMMIT=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Cross-compile
        run: |
          LDFLAGS="-s -w -X main.version=${{ steps.vars.outputs.VERSION }} -X main.commit=${{ steps.vars.outputs.COMMIT }} -X main.date=${{ steps.vars.outputs.DATE }}"
          mkdir -p dist

          GOOS=darwin  GOARCH=amd64 CGO_ENABLED=0 go build -ldflags "${LDFLAGS}" -trimpath -o dist/doogle-darwin-amd64  ./cmd/doogle
          GOOS=darwin  GOARCH=arm64 CGO_ENABLED=0 go build -ldflags "${LDFLAGS}" -trimpath -o dist/doogle-darwin-arm64  ./cmd/doogle
          GOOS=linux   GOARCH=amd64 CGO_ENABLED=0 go build -ldflags "${LDFLAGS}" -trimpath -o dist/doogle-linux-amd64   ./cmd/doogle
          GOOS=linux   GOARCH=arm64 CGO_ENABLED=0 go build -ldflags "${LDFLAGS}" -trimpath -o dist/doogle-linux-arm64   ./cmd/doogle
          GOOS=android GOARCH=arm64 CGO_ENABLED=0 go build -ldflags "${LDFLAGS}" -trimpath -o dist/doogle-android-arm64 ./cmd/doogle

      - name: Generate checksums
        run: |
          cd dist
          sha256sum doogle-* > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/doogle-*
            dist/checksums.txt

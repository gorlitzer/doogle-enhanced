version: "3.9"

services:
  # ---- Bootstrap node (first node in the network) ----
  node1:
    build: .
    container_name: doogle-node1
    command:
      - doogle
      - --port=7001
      - --api-port=7002
      - --bind=0.0.0.0
      - --data-dir=/data
    ports:
      - "7001:7001"   # P2P
      - "7002:7002"   # API + Web UI
    volumes:
      - node1-data:/data
    restart: unless-stopped

  # ---- Second node (connects to node1) ----
  node2:
    build: .
    container_name: doogle-node2
    depends_on:
      - node1
    command:
      - doogle
      - --port=7001
      - --api-port=7002
      - --bind=0.0.0.0
      - --data-dir=/data
      - --bootstrap=/ip4/node1/tcp/7001
    ports:
      - "7003:7001"   # P2P (mapped to host 7003)
      - "7004:7002"   # API + Web UI
    volumes:
      - node2-data:/data
    restart: unless-stopped

  # ---- Third node (connects to node1) ----
  node3:
    build: .
    container_name: doogle-node3
    depends_on:
      - node1
    command:
      - doogle
      - --port=7001
      - --api-port=7002
      - --bind=0.0.0.0
      - --data-dir=/data
      - --bootstrap=/ip4/node1/tcp/7001
    ports:
      - "7005:7001"
      - "7006:7002"
    volumes:
      - node3-data:/data
    restart: unless-stopped

volumes:
  node1-data:
  node2-data:
  node3-data:

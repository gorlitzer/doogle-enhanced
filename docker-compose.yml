services:
  # ---- Single node (default) ----
  node1:
    build: .
    container_name: doogle-node1
    command:
      - doogle
      - --port=7001
      - --api-port=7002
      - --bind=0.0.0.0
      - --data-dir=/data
      - --headless
    ports:
      - "7001:7001"      # P2P
      - "7001:7001/udp"  # QUIC
      # API + Web UI — published to the host loopback only. The admin API is
      # unauthenticated over HTTP; front it with a TLS-terminating auth proxy
      # before exposing it beyond localhost.
      - "127.0.0.1:7002:7002"
    volumes:
      - node1-data:/data
    restart: unless-stopped

  # ---- Second node (connects to node1 via mDNS/DHT) ----
  node2:
    build: .
    container_name: doogle-node2
    depends_on:
      - node1
    command:
      - doogle
      - --port=7001
      - --api-port=7002
      - --bind=0.0.0.0
      - --data-dir=/data
      - --headless
      - --bootstrap=/ip4/node1/tcp/7001
    ports:
      - "7003:7001"                # P2P
      - "127.0.0.1:7004:7002"      # API + Web UI (loopback-only)
    volumes:
      - node2-data:/data
    restart: unless-stopped

  # ---- Third node ----
  node3:
    build: .
    container_name: doogle-node3
    depends_on:
      - node1
    command:
      - doogle
      - --port=7001
      - --api-port=7002
      - --bind=0.0.0.0
      - --data-dir=/data
      - --headless
      - --bootstrap=/ip4/node1/tcp/7001
    ports:
      - "7005:7001"
      - "127.0.0.1:7006:7002"      # API + Web UI (loopback-only)
    volumes:
      - node3-data:/data
    restart: unless-stopped

  # ---- Neural embeddings via Ollama (optional) ----
  # Usage: docker compose up -d node1 ollama
  # Then: docker compose up -d node1-neural  (or add --ollama-url to any node)
  ollama:
    image: ollama/ollama:latest
    container_name: doogle-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    # Pull the embedding model on first start:
    #   docker exec doogle-ollama ollama pull all-minilm

  # ---- Node with neural search (connects to Ollama) ----
  node1-neural:
    build: .
    container_name: doogle-node1-neural
    depends_on:
      - ollama
    command:
      - doogle
      - --port=7001
      - --api-port=7002
      - --bind=0.0.0.0
      - --data-dir=/data
      - --headless
      - --ollama-url=http://ollama:11434
    ports:
      - "7001:7001"
      - "7001:7001/udp"
      - "127.0.0.1:7002:7002"      # API + Web UI (loopback-only)
    volumes:
      - node1-data:/data
    restart: unless-stopped

volumes:
  node1-data:
  node2-data:
  node3-data:
  ollama-data:

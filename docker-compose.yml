version: "3.9"

services:
  # ---- Bootstrap node (first node in the network) ----
  node1:
    build: .
    container_name: doogle-node1
    command:
      - doogle
      - --port=4001
      - --api-port=8080
      - --data-dir=/data
      - --seed=https://example.com
    ports:
      - "4001:4001"   # P2P
      - "8080:8080"   # API + Web UI
    volumes:
      - node1-data:/data
    restart: unless-stopped

  # ---- Second node (connects to node1) ----
  node2:
    build: .
    container_name: doogle-node2
    depends_on:
      - node1
    command:
      - doogle
      - --port=4001
      - --api-port=8080
      - --data-dir=/data
      - --bootstrap=/ip4/node1/tcp/4001
    ports:
      - "4002:4001"   # P2P (mapped to host 4002)
      - "8081:8080"   # API + Web UI
    volumes:
      - node2-data:/data
    restart: unless-stopped

  # ---- Third node (connects to node1) ----
  node3:
    build: .
    container_name: doogle-node3
    depends_on:
      - node1
    command:
      - doogle
      - --port=4001
      - --api-port=8080
      - --data-dir=/data
      - --bootstrap=/ip4/node1/tcp/4001
    ports:
      - "4003:4001"
      - "8082:8080"
    volumes:
      - node3-data:/data
    restart: unless-stopped

volumes:
  node1-data:
  node2-data:
  node3-data:

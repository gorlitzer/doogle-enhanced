# Doogle v2 - Default Node Configuration

# P2P networking
p2p:
  port: 4001
  # Bootstrap peers (multiaddr format)
  bootstrap_peers: []
  # Enable mDNS for local network discovery
  mdns: true
  # Protocol prefix
  protocol_prefix: /doogle

# HTTP API
api:
  port: 8080
  # Bind address (0.0.0.0 for all interfaces)
  bind: "0.0.0.0"

# Crawler settings
crawler:
  # Number of concurrent crawl workers
  workers: 4
  # User-Agent string
  user_agent: "DoogleBot/2.0 (+https://github.com/doogle/doogle-v2)"
  # Request timeout
  request_timeout: 30s
  # Per-domain rate limit (requests per minute)
  rate_limit: 10
  # Maximum crawl depth from seed
  max_depth: 3
  # Respect robots.txt
  respect_robots: true

# Index settings
index:
  # Bleve index directory (relative to data_dir)
  bleve_dir: "bleve"

# Storage settings
storage:
  # Data directory for all persistent data
  data_dir: "./data/doogle"
  # BadgerDB directory (relative to data_dir)
  badger_dir: "badger"

# Search settings
search:
  # Maximum results per query
  max_results: 50
  # Default results per page
  default_page_size: 10
  # Distributed search timeout
  peer_timeout: 5s
  # Maximum peers to query
  max_peers: 10

# Logging
log:
  level: "info"

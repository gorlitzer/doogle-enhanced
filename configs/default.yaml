# Doogle v2 - Default Node Configuration

# Human-readable node name (shown in UI and to peers)
node_name: ""

# P2P networking
p2p:
  port: 7001
  # Bootstrap peers (multiaddr format)
  bootstrap_peers: []
  # Enable mDNS for local network discovery
  mdns: true
  # Enable DHT-based peer discovery via IPFS public bootstrap nodes
  dht_discovery: true
  # Rendezvous namespace for finding other Doogle nodes on the DHT
  dht_rendezvous: "doogle/network/v2"
  # How often to search the DHT for new peers
  dht_discovery_interval: 30s
  # Maximum number of peers before skipping DHT discovery rounds
  dht_max_peers: 50
  # Protocol prefix
  protocol_prefix: /doogle

# HTTP API
api:
  port: 7002
  # Bind address (0.0.0.0 for all interfaces)
  bind: "127.0.0.1"

# Crawler settings
crawler:
  # Number of concurrent crawl workers
  workers: 4
  # User-Agent string
  user_agent: "DoogleBot/2.0 (+https://github.com/doogle/doogle-v2)"
  # Request timeout
  request_timeout: 30s
  # Per-domain rate limit (requests per minute)
  rate_limit: 10
  # Maximum crawl depth from seed
  max_depth: 3
  # Respect robots.txt
  respect_robots: true
  # Headless browser rendering for JS-heavy SPAs (requires Chromium)
  enable_headless: false
  # Content below this byte threshold triggers headless fallback
  headless_threshold: 500
  # Timeout for headless page rendering
  headless_timeout: 30s

# Index settings
index:
  # Bleve index directory (relative to data_dir)
  bleve_dir: "bleve"
  # How often to recompute PageRank scores
  pagerank_interval: 5m

# Storage settings
storage:
  # Data directory for all persistent data
  data_dir: "./data/doogle"
  # BadgerDB directory (relative to data_dir)
  badger_dir: "badger"

# Search settings
search:
  # Maximum results per query
  max_results: 50
  # Default results per page
  default_page_size: 10
  # Distributed search timeout
  peer_timeout: 5s
  # Maximum peers to query
  max_peers: 10
  # LRU cache for search results (0 = disabled)
  cache_size: 1000
  # How long cached results stay valid
  cache_ttl: 5m

# Logging
log:
  level: "info"
